<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#d946ef" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="480" rx="16" fill="url(#bgGrad)" />

  <!-- Header Banner -->
  <rect x="0" y="0" width="960" height="70" fill="url(#cardGrad)" rx="16" />
  <rect x="0" y="68" width="960" height="2" fill="url(#accentGrad)" />
  <text x="480" y="44" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="700" text-anchor="middle" letter-spacing="1">DATA SCIENCE ARCHITECT ARCHITECTURE</text>

  <!-- Input Node -->
  <g transform="translate(40, 110)" filter="url(#shadow)">
    <rect width="200" height="220" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2" />
    <rect width="200" height="40" rx="12" fill="#334155" />
    <text x="100" y="26" fill="#f8fafc" font-family="sans-serif" font-size="14" font-weight="700" text-anchor="middle">INPUT DATA &amp; SPECS</text>

    <text x="20" y="70" fill="#94a3b8" font-family="sans-serif" font-size="12">📊 Raw Tabular Dataset</text>
    <text x="20" y="100" fill="#94a3b8" font-family="sans-serif" font-size="12">🎯 Target Definition</text>
    <text x="20" y="130" fill="#94a3b8" font-family="sans-serif" font-size="12">⚙️ Business Constraints</text>
    <text x="20" y="160" fill="#94a3b8" font-family="sans-serif" font-size="12">🌐 Domain Knowledge</text>
    <text x="20" y="190" fill="#94a3b8" font-family="sans-serif" font-size="12">⏱️ Metric Thresholds</text>
  </g>

  <!-- Connector Line 1 -->
  <path d="M 240 220 L 340 220" stroke="#8b5cf6" stroke-width="3" stroke-dasharray="6,6" />
  <polygon points="340,215 350,220 340,225" fill="#8b5cf6" />

  <!-- Core Engine Node -->
  <g transform="translate(350, 90)" filter="url(#shadow)">
    <rect width="260" height="260" rx="16" fill="url(#cardGrad)" stroke="url(#accentGrad)" stroke-width="3" />
    <rect width="260" height="48" rx="16" fill="url(#accentGrad)" />
    <text x="130" y="30" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="800" text-anchor="middle">SKILL ENGINE</text>

    <text x="20" y="80" fill="#e2e8f0" font-family="sans-serif" font-size="13" font-weight="600">1. Data Quality Auditor</text>
    <text x="20" y="110" fill="#e2e8f0" font-family="sans-serif" font-size="13" font-weight="600">2. Leakage-Free Preprocessor</text>
    <text x="20" y="140" fill="#e2e8f0" font-family="sans-serif" font-size="13" font-weight="600">3. Baseline &amp; Multi-Model CV</text>
    <text x="20" y="170" fill="#e2e8f0" font-family="sans-serif" font-size="13" font-weight="600">4. Stratified Split Validator</text>
    <text x="20" y="200" fill="#e2e8f0" font-family="sans-serif" font-size="13" font-weight="600">5. SHAP / Importance Attribution</text>
    <text x="20" y="230" fill="#e2e8f0" font-family="sans-serif" font-size="13" font-weight="600">6. Model Artifact Serializer</text>
  </g>

  <!-- Connector Line 2 -->
  <path d="M 610 220 L 710 220" stroke="#10b981" stroke-width="3" stroke-dasharray="6,6" />
  <polygon points="710,215 720,220 710,225" fill="#10b981" />

  <!-- Output Node -->
  <g transform="translate(720, 110)" filter="url(#shadow)">
    <rect width="200" height="220" rx="12" fill="#1e293b" stroke="#059669" stroke-width="2" />
    <rect width="200" height="40" rx="12" fill="url(#greenGrad)" />
    <text x="100" y="26" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="700" text-anchor="middle">OUTPUT ARTIFACTS</text>

    <text x="20" y="70" fill="#34d399" font-family="sans-serif" font-size="12">📦 Model Pipeline (.joblib)</text>
    <text x="20" y="100" fill="#34d399" font-family="sans-serif" font-size="12">📈 Evaluation Metrics Report</text>
    <text x="20" y="130" fill="#34d399" font-family="sans-serif" font-size="12">📋 Predictions Dataset (.csv)</text>
    <text x="20" y="160" fill="#34d399" font-family="sans-serif" font-size="12">📊 Feature Importance Ranking</text>
    <text x="20" y="190" fill="#34d399" font-family="sans-serif" font-size="12">📉 Comparison Chart (.png)</text>
  </g>

  <!-- Bottom Core Principles Bar -->
  <g transform="translate(40, 390)">
    <rect width="880" height="60" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5" />
    <text x="440" y="25" fill="#a7f3d0" font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle">CORE GUIDING PRINCIPLES</text>
    <text x="440" y="45" fill="#94a3b8" font-family="sans-serif" font-size="12" text-anchor="middle">🔒 Anti-Leakage Encapsulation  •  🔁 100% Reproducible Seeds  •  📊 Evidence-Based Metrics  •  🔍 Explainable AI</text>
  </g>
</svg>
